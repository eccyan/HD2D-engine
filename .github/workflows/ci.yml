name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            preset: linux
          - os: windows-latest
            preset: windows
          - os: macos-latest
            preset: macos

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1.0.5
        with:
          vulkan_version: 1.3.290.0
          optional_components: com.lunarg.vulkan.vma
          install_runtime: true
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev glslc libgl-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install vulkan-headers vulkan-loader molten-vk shaderc

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}-release

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}-release

  test-cpp:
    runs-on: ubuntu-24.04
    name: Test (C++)

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev glslc libgl-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

      - name: Test
        run: ctest --test-dir build/linux-release --output-on-failure

  test-tools:
    runs-on: ubuntu-24.04
    name: Test (TypeScript)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: cd tools && pnpm install

      - name: Build packages
        run: cd tools && pnpm -r build

      - name: Run tests
        run: cd tools && pnpm --filter @gseurat/tests test:echidna-ply-export
